<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>For Ayesha 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            /* Soft Pink & Cream Gradient */
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* --- Floating Elements (Hearts/Bubbles) --- */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- Glass Card --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 40px 25px;
            border-radius: 40px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(244, 143, 177, 0.3);
            animation: slideIn 1.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .avatar-area {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.5);
            animation: bounce 2s infinite ease-in-out;
            border: 4px solid #f06292;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #ad1457;
            margin-bottom: 10px;
        }

        p {
            color: #880e4f;
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        /* --- Stylish Pink Button --- */
        .glow-btn {
            background: #f06292;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.4);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .glow-btn:active { transform: scale(0.95); }

        /* Animation for Button Shine */
        .glow-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        /* Floating 3D Emojis */
        .floating-emoji {
            position: absolute;
            z-index: 5;
            animation: floatAround 4s infinite alternate ease-in-out;
        }

        @keyframes floatAround {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(15px, 25px) rotate(15deg); }
        }

    </style>
</head>
<body>

    <audio id="mainSong" loop>
        <source src="./rm.mpeg" type="audio/mpeg">
    </audio>

    <div id="bubbles-container"></div>
    
    <div class="floating-emoji" style="top: 10%; left: 10%; font-size: 40px;">🌸</div>
    <div class="floating-emoji" style="bottom: 15%; right: 10%; font-size: 35px; animation-delay: 1s;">🍬</div>
    <div class="floating-emoji" style="top: 20%; right: 15%; font-size: 30px; animation-delay: 0.5s;">💖</div>

    <div class="glass-card">
        <div class="avatar-area">🌸</div>
        <h1>Hi Ayesha!</h1>
        <p>I made something special just to see you smile. Ready? ✨</p>
        <button class="glow-btn" onclick="startExperience()">Tap to Enter ➔</button>
    </div>

    <script>
        // 1. Create Floating Bubbles/Hearts
        const container = document.getElementById('bubbles-container');
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 40 + 10 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDuration = Math.random() * 4 + 4 + 's';
            container.appendChild(b);
            
            setTimeout(() => b.remove(), 8000);
        }
        setInterval(createBubble, 400);

        // 2. Start Logic
        function startExperience() {
            const music = document.getElementById('mainSong');
            music.volume = 0.5;
            music.play();

            // Transition Animation
            document.body.style.transition = "2s ease";
            document.body.style.background = "#ad1457";
            document.querySelector('.glass-card').style.transform = "scale(0) rotate(20deg)";
            document.querySelector('.glass-card').style.opacity = "0";

            setTimeout(() => {
                // Yahan Page 2 par redirect karenge
                window.location.href = "game.html"; 
            }, 1000);
        }
    </script>
</body>
</html>
